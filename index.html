<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LumekaTech</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8NB7p2QzE9RWxPbz5T9jpJ1rssZCvXg=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-bg">
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="logo">
            <div class="logo-inner"></div>
          </div>
          <h1>Lumeka<span>Tech</span></h1>
        </div>

        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Pesquise por tópicos..." />
        </div>

        <button class="add-btn" aria-label="Adicionar">
          <i class="fa-solid fa-plus"></i>
        </button>

        <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">
          <i class="fa-solid fa-bars"></i>
        </button>
      </header>

      <div class="layout">
        <aside class="sidebar" id="sidebar">
          <nav class="sidebar-nav">
            <a href="#" class="nav-item active">
              <i class="fa-solid fa-house"></i>
              <span>Comunidade Geral</span>
            </a>

            <a href="#" class="nav-item">
              <i class="fa-regular fa-folder"></i>
              <span>Projetos</span>
            </a>

            <a href="#" class="nav-item">
              <i class="fa-regular fa-id-badge"></i>
              <span>Meu Perfil</span>
            </a>

            <a href="#" class="nav-item">
              <i class="fa-regular fa-user"></i>
              <span>Meu Perfil</span>
            </a>

            <a href="#" class="nav-item">
              <i class="fa-regular fa-bookmark"></i>
              <span>Minhas Aulas</span>
            </a>
          </nav>

          <div class="sidebar-community">
            <div class="community-title">
              <i class="fa-solid fa-puzzle-piece"></i>
              <span>Comunidade Nicho:</span>
            </div>
            <strong>Finanças</strong>
          </div>
        </aside>

        <main class="main-content">
          <section class="hero-card card">
            <div>
              <h2>Bem-vindo, João!</h2>
              <p>Nicho: Finanças</p>
            </div>

            <div class="progress-row">
              <div class="progress-bar">
                <span style="width: 60%;"></span>
              </div>
              <strong>60%</strong>
            </div>
          </section>

          <section class="cards-grid">
            <article class="post-card card">
              <div class="post-image">
                <img
                  src="https://images.unsplash.com/photo-1563013544-824ae1b704d3?auto=format&fit=crop&w=900&q=80"
                  alt="Monetize seu App em Angola"
                />
              </div>

              <div class="post-body">
                <h3>Monetize seu App em</h3>
                <p class="subtitle">Angola</p>

                <div class="post-meta">
                  <div class="author">
                    <img
                      src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=200&q=80"
                      alt="Pedro K."
                    />
                    <span>Autor: Pedro K.</span>
                  </div>

                  <div class="meta-actions">
                    <span><i class="fa-solid fa-circle-check"></i> Comentar</span>
                    <span><i class="fa-solid fa-comment-dots"></i> (35)</span>
                  </div>
                </div>
              </div>
            </article>

            <article class="community-card card">
              <div>
                <h3>Solução Desemprergo Luanda</h3>

                <div class="progress-bar green">
                  <span style="width: 62%;"></span>
                </div>

                <div class="members">
                  <img
                    src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=200&q=80"
                    alt="Membro 1"
                  />
                  <img
                    src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=200&q=80"
                    alt="Membro 2"
                  />
                  <img
                    src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=200&q=80"
                    alt="Membro 3"
                  />
                </div>
              </div>

              <button class="join-btn">Join</button>
            </article>
          </section>

          <div class="load-more">
            <button id="loadMoreBtn">Carregar mais...</button>
          </div>
        </main>
      </div>

      <footer class="footer">
        <div class="footer-progress">
          <div class="mini-chart">
            <span>60%</span>
          </div>
          <p>Progresso Aulas: 60%</p>
        </div>

        <a href="#" class="support-link">Suporte</a>
      </footer>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
