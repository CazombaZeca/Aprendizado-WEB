<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Perfil - LumekaTech</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />

  <link rel="stylesheet" href="style/perfil.css" />
</head>
<body>
  <div class="page-bg">
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">
            <i class="fa-solid fa-bars"></i>
          </button>

          <div class="brand">
            <div class="brand-logo">
              <span class="logo-inner"></span>
            </div>
            <h1>Lumeka<span>Tech</span></h1>
          </div>
        </div>

        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Pesique por tópicos..." />
        </div>

        <button class="add-btn" aria-label="Adicionar">
          <i class="fa-solid fa-plus"></i>
        </button>
      </header>

      <section class="page-title-bar">
        <h2>Meu Perfil</h2>
      </section>

      <div class="dashboard-layout">
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-inner">
            <nav class="sidebar-nav">
              <a href="#" class="nav-item active">
                <i class="fa-regular fa-user"></i>
                <span>Comuniolae Geral</span>
              </a>

              <a href="#" class="nav-item">
                <i class="fa-solid fa-bag-shopping"></i>
                <span>Projetos</span>
              </a>

              <a href="#" class="nav-item">
                <i class="fa-solid fa-camera"></i>
                <span>Projetos</span>
              </a>

              <a href="#" class="nav-item">
                <i class="fa-solid fa-location-dot"></i>
                <span>Minhas Aulas</span>
              </a>

              <a href="#" class="nav-item">
                <i class="fa-regular fa-file-lines"></i>
                <span>Comunidde Nicho: Finâncias</span>
              </a>

              <a href="#" class="nav-item">
                <i class="fa-solid fa-user"></i>
                <span>Logout</span>
              </a>
            </nav>
          </div>
        </aside>

        <main class="main-content">
          <div class="profile-grid">
            <section class="profile-card card fade-in">
              <div class="profile-avatar">
                <img
                  src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=400&q=80"
                  alt="João Silva"
                />
              </div>

              <div class="profile-info">
                <h3 id="profileName">João Silva</h3>
                <p id="profileRole">Dev em Luanda</p>

                <div class="profile-tags">
                  <span class="tag tech" id="profileTag">Tech</span>
                </div>
              </div>

              <div class="profile-badges">
                <button class="badge-btn yellow" aria-label="Badge 1">
                  <i class="fa-regular fa-star"></i>
                </button>
                <button class="badge-btn blue" aria-label="Badge 2">
                  <i class="fa-regular fa-hand-peace"></i>
                </button>
                <button class="badge-btn green" aria-label="Badge 3">
                  <i class="fa-regular fa-face-smile"></i>
                </button>
                <button class="badge-btn green" aria-label="Badge 4">
                  <i class="fa-regular fa-shield-heart"></i>
                </button>
              </div>
            </section>

            <aside class="stats-card card fade-in delay-1">
              <h3>Estatisticas</h3>
              <p>Dúvidas Resolvides: <strong id="solvedPercent">100%</strong></p>

              <div class="chart-box">
                <div class="chart-grid"></div>
                <svg viewBox="0 0 240 140" class="chart-svg" aria-hidden="true">
                  <polyline
                    class="line-blue"
                    points="10,110 45,70 80,85 115,40 155,35 190,20 225,18"
                  />
                  <polyline
                    class="line-green"
                    points="10,100 55,50 90,78 125,25 155,55 195,38 225,12"
                  />
                </svg>
              </div>
            </aside>

            <section class="connections-card card fade-in delay-2">
              <h3>Conexões</h3>

              <div class="connection-list">
                <div class="connection-item">
                  <i class="fa-regular fa-comment"></i>
                  <span>@MentorFinânças</span>
                </div>

                <div class="connection-item">
                  <i class="fa-solid fa-link"></i>
                  <span>@DevAngola</span>
                </div>
              </div>

              <button class="edit-btn" id="editProfileBtn">Editar Perfil</button>
            </section>
          </div>
        </main>
      </div>

      <footer class="app-footer">
        <div class="footer-progress">
          <div class="footer-progress-bar">
            <span id="footerProgressFill"></span>
          </div>
          <strong id="footerProgressValue">60%</strong>
        </div>

        <a href="#" class="support-link">Suporte</a>
      </footer>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <script src="js/perfil.js"></script>
</body>
</html>
